spring.application.name=collab-workspace
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# MySQL configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/collab_workspace?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:false}

# Mail configuration (set real values before running OTP/reset email)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:10000}

app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.mail.require-success=${APP_MAIL_REQUIRE_SUCCESS:false}
app.security.otp-expiry-minutes=${APP_SECURITY_OTP_EXPIRY_MINUTES:10}
app.security.reset-expiry-minutes=${APP_SECURITY_RESET_EXPIRY_MINUTES:20}
app.websocket.allowed-origin-patterns=${APP_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:8080,https://*.netlify.app}
