<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | CollabSpace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .verify-shell {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .verify-card {
            width: 100%;
            max-width: 460px;
            background: var(--panel-solid);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-xl);
            box-shadow: 0 30px 80px rgba(0,0,0,0.65), 0 0 60px rgba(99,102,241,0.12);
            padding: 34px;
        }

        .verify-brand {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 14px;
        }

        .verify-title {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .verify-sub {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .verify-form {
            display: grid;
            gap: 10px;
        }

        .verify-form label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
        }

        .verify-form button,
        .resend-form button {
            width: 100%;
            margin-top: 8px;
        }

        .resend-form {
            margin-top: 10px;
        }

        .verify-links {
            margin-top: 16px;
            text-align: center;
        }

        .verify-links a {
            color: var(--brand-2);
            text-decoration: none;
            font-weight: 700;
        }

        .alert {
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .alert.success {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.35);
            color: #86efac;
        }

        .alert.error {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.35);
            color: #fca5a5;
        }
    </style>
</head>
<body>
<div class="app-bg">
    <header class="top-bar">
        <a class="top-bar-brand" th:href="@{/dashboard}">
            <div class="brand-icon" aria-label="CollabSpace logo">&#x2728;</div>
            <div>
                <h1>Collab<span>Space</span></h1>
            </div>
        </a>
    </header>

    <div class="verify-shell">
        <div class="verify-card">
            <div class="verify-brand">&#x2728;</div>
            <h1 class="verify-title">Verify OTP</h1>
            <p class="verify-sub">Enter the one-time code sent to your email to activate your account.</p>

            <div class="alert success" th:if="${param.resent}">A new OTP has been sent.</div>
            <div class="alert error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/verify-otp}" th:object="${otpRequest}" method="post" class="verify-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <label>Email</label>
                <input type="email" th:field="*{email}" required>

                <label>OTP</label>
                <input type="text" th:field="*{otp}" placeholder="6-digit OTP" required>

                <button type="submit" class="btn btn-primary btn-lg">Verify Account</button>
            </form>

            <form th:action="@{/resend-otp}" method="post" class="resend-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="email" th:value="${otpRequest.email}">
                <button type="submit" class="btn btn-ghost">Resend OTP</button>
            </form>

            <div class="verify-links">
                <a th:href="@{/dashboard(login=true)}">Back to sign in</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
