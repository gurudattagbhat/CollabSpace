<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | CollabSpace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <h1>Forgot Password</h1>
        <p class="subtext">Enter your email, get an OTP, and reset your password here.</p>

        <div class="alert success" th:if="${param.otpSent}">
            If this email is registered, an OTP has been sent.
        </div>
        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post" class="auth-form">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com" required>
            <button type="submit">Get OTP</button>
        </form>

        <hr style="margin:18px 0;border:none;border-top:1px solid rgba(20,93,160,0.14)">

        <form th:action="@{/forgot-password/reset}" th:object="${resetPasswordRequest}" method="post" class="auth-form">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com" required>

            <label>OTP</label>
            <input type="text" th:field="*{token}" placeholder="6-digit OTP" required>

            <label>New Password</label>
            <input type="password" th:field="*{newPassword}" placeholder="At least 8 characters" minlength="8" required>

            <button type="submit">Reset Password</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/login}">Back to login</a>
        </div>
    </div>
</div>
</body>
</html>
