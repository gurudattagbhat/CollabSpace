<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Collaborative Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <h1>Reset Password</h1>
        <p class="subtext">Use your reset token and set a new password.</p>

        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post" class="auth-form">
            <label>Reset Token</label>
            <input type="text" th:field="*{token}" required>

            <label>New Password</label>
            <input type="password" th:field="*{newPassword}" placeholder="At least 8 characters" required>

            <button type="submit">Reset Password</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/login}">Back to login</a>
        </div>
    </div>
</div>
</body>
</html>
